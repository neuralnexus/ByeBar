name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate site files
        run: |
          test -f docs/.nojekyll
          test -f docs/index.html
          test -f docs/CNAME
          grep -q 'byebar.mattivan.com' docs/CNAME

      - name: Check custom-domain DNS
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          health=$(gh api "repos/${{ github.repository }}/pages/health" --jq '.domain')
          eligible=$(echo "$health" | jq -r '.is_https_eligible')
          cname_ok=$(echo "$health" | jq -r '.is_cname_to_github_user_domain')
          proxied=$(echo "$health" | jq -r '.is_proxied')
          echo "$health" | jq '{host, is_https_eligible, is_cname_to_github_user_domain, is_proxied, has_cname_record}'
          if [ "$eligible" != "true" ] || [ "$cname_ok" != "true" ]; then
            echo "::warning::Custom domain DNS is not GitHub-eligible. Set Cloudflare CNAME byebar -> neuralnexus.github.io (DNS only / grey cloud). See DOMAIN.md."
          fi
          if [ "$proxied" = "true" ]; then
            echo "::warning::Domain is Cloudflare-proxied without a public CNAME to GitHub. Deploy may fail until DNS is fixed."
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4