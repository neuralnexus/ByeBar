name: Bug report
description: Something isn't working as expected
title: '[Bug] '
labels:
  - bug
body:
  - type: input
    id: version
    attributes:
      label: ByeBar version
      placeholder: e.g. 0.2.0
    validations:
      required: true
  - type: input
    id: site
    attributes:
      label: Site where it happened
      placeholder: e.g. example.com
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
