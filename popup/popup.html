<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ByeBar</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="brand">
      <img class="logo" src="../icons/icon-48.png" width="48" height="48" alt="" />
      <h1>ByeBar</h1>
      <p class="tagline">Remove intrusive popups. Browse in peace.</p>
    </header>

    <main class="content">
      <section class="hero">
        <p class="hero-title">Popup gone.</p>
        <p class="hero-sub">Focus on what matters.</p>
        <p class="status-pill" id="status-pill">No more distractions</p>
      </section>

      <section class="settings">
        <label class="row">
          <span>Enabled on this site</span>
          <input type="checkbox" id="site-enabled" checked />
        </label>

        <label class="row">
          <span>Generic blocking (all sites)</span>
          <input type="checkbox" id="generic-blocking" checked />
        </label>

        <label class="row">
          <span>Auto-decline cookie banners</span>
          <input type="checkbox" id="cookie-decline" checked />
        </label>

        <label class="row">
          <span>Auto-accept terms &amp; legal modals</span>
          <input type="checkbox" id="tos-accept" checked />
        </label>

        <label class="row">
          <span>Auto-decline location requests</span>
          <input type="checkbox" id="location-decline" checked />
        </label>

        <label class="row">
          <span>Bypass lead forms</span>
          <input type="checkbox" id="bypass-lead-forms" checked />
        </label>
      </section>

      <p class="host" id="host-label"></p>

      <footer class="footer">
        <p class="privacy-note">
          <span class="privacy-label">Data stays local</span>
          Runs in your browser only — no telemetry.
        </p>
        <p class="credit">
          Made by <a href="https://mattivan.com" target="_blank" rel="noopener noreferrer">Matt Ivan</a>
        </p>
      </footer>
    </main>

    <script src="../shared/browser.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
