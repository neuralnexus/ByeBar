<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ByeBar</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="brand">
      <img class="logo" src="../icons/icon-48.png" width="40" height="40" alt="" />
      <h1>ByeBar</h1>
      <p class="tagline">Remove distracting popups and make webpages easier to browse. Not an ad-blocker.</p>
    </header>

    <main class="content">
      <section class="settings">
        <label class="row row--site">
          <span class="row-copy">
            <span class="row-title">Enabled on this site</span>
            <span class="row-host" id="host-label"></span>
          </span>
          <input type="checkbox" id="site-enabled" checked />
        </label>

        <label class="row">
          <span>Block newsletter overlays (all sites)</span>
          <input type="checkbox" id="generic-blocking" checked />
        </label>

        <label class="row">
          <span>Auto-decline cookie banners</span>
          <input type="checkbox" id="cookie-decline" checked />
        </label>

        <label class="row">
          <span>Auto-accept terms &amp; legal modals</span>
          <input type="checkbox" id="tos-accept" checked />
        </label>

        <label class="row">
          <span>Auto-decline location requests</span>
          <input type="checkbox" id="location-decline" checked />
        </label>

        <label class="row">
          <span>Bypass lead forms</span>
          <input type="checkbox" id="bypass-lead-forms" checked />
        </label>
      </section>

      <footer class="footer">
        <p class="privacy-note">Data stays local</p>
        <p class="footer-links">
          <a href="#" id="report-bug" target="_blank" rel="noopener noreferrer">Report a bug</a>
          ·
          <a href="#" id="request-feature" target="_blank" rel="noopener noreferrer">Request a feature</a>
        </p>
        <p class="credit">
          Made by <a href="https://mattivan.com" target="_blank" rel="noopener noreferrer">Matt Ivan</a>
        </p>
      </footer>
    </main>

    <script src="../shared/browser.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
